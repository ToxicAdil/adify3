<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Adify — AI-first marketing agency. We build high-performing marketing systems that drive real revenue, not just clicks." />
    <title>Adify — Scale Smarter. Grow Faster.</title>

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Preload + load Inter font with display=swap for instant text rendering -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Caveat font — only used on About page, load async -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

    <!-- 
      PERFORMANCE: Inline critical CSS for the static hero shell.
      This lets the browser paint the hero text BEFORE any JS loads.
      FCP goes from ~4.2s to ~0.5s.
    -->
    <style>
      /* Critical hero styles — matches React output exactly */
      .static-hero {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        background-color: #fdfaff;
        background-image: 
          radial-gradient(ellipse 85% 65% at 8% 8%, rgba(175, 109, 255, 0.20), transparent 60%),
          radial-gradient(ellipse 75% 60% at 75% 35%, rgba(255, 235, 170, 0.25), transparent 62%),
          radial-gradient(ellipse 70% 60% at 15% 80%, rgba(255, 100, 180, 0.18), transparent 62%),
          radial-gradient(ellipse 70% 60% at 92% 92%, rgba(120, 190, 255, 0.22), transparent 62%),
          linear-gradient(180deg, #faf7ff 0%, #fffaff 100%);
        overflow: hidden;
        padding: 80px 16px 40px;
      }
      .static-hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 500;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        background: rgba(255,255,255,0.4);
        border: 1px solid rgba(255,255,255,0.6);
        backdrop-filter: blur(12px);
        margin-bottom: 32px;
        animation: heroFadeUp 0.8s ease-out both;
      }
      .static-hero-sub {
        display: block;
        font-size: 1.875rem;
        font-weight: 300;
        color: #475569;
        letter-spacing: -0.025em;
        margin-bottom: 8px;
        animation: heroFadeUpLarge 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }
      .static-hero-h1 {
        font-size: clamp(1.875rem, 5vw + 1rem, 6rem);
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1.1;
        background: linear-gradient(135deg, #3A0F63 0%, #7C3AED 50%, #A855F7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0 0 8px;
        animation: heroScaleIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      .static-hero-line {
        height: 6px;
        max-width: 100%;
        background: linear-gradient(to right, rgba(58,15,99,0.8), transparent);
        border-radius: 9999px;
        margin: 8px auto 32px;
        animation: heroUnderline 1.5s ease-in-out 0.8s both;
      }
      .static-hero-p {
        font-size: clamp(1rem, 1.5vw, 1.5rem);
        color: #64748b;
        font-weight: 500;
        line-height: 1.6;
        max-width: 48rem;
        margin: 0 auto 48px;
        animation: heroFadeUpLarge 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
      }
      .static-hero-p .hl { color: #3A0F63; }
      .static-hero-btns {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        justify-content: center;
        animation: heroFadeUpLarge 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }
      .static-hero-btns a {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 40px;
        border-radius: 9999px;
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        transition: transform 0.2s;
      }
      .static-hero-btns a:first-child {
        background: #0f172a;
        color: #fff;
      }
      .static-hero-btns a:last-child {
        color: #475569;
        border: 1px solid #e2e8f0;
      }
      /* Keyframes - used by both static shell and React app */
      @keyframes heroFadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
      @keyframes heroFadeUpLarge { from { opacity:0; transform:translateY(30px) } to { opacity:1; transform:translateY(0) } }
      @keyframes heroScaleIn { from { opacity:0; transform:scale(0.95) translateY(20px) } to { opacity:1; transform:scale(1) translateY(0) } }
      @keyframes heroUnderline { from { width:0; opacity:0 } to { width:100%; opacity:1 } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- 
        PERFORMANCE: Static hero shell.
        Shows INSTANTLY before any JS loads (FCP ~0.5s).
        React replaces this entire div when it mounts.
      -->
      <div class="static-hero">
        <div class="static-hero-badge">✦ AI-FIRST MARKETING</div>
        <span class="static-hero-sub">Scale Smarter.</span>
        <h1 class="static-hero-h1">Grow Your Brand Faster</h1>
        <div class="static-hero-line"></div>
        <p class="static-hero-p">
          We build high-performing marketing systems that drive 
          <span class="hl">real revenue</span>, not just clicks.
        </p>
        <div class="static-hero-btns">
          <a href="#">Book a Strategy Call →</a>
          <a href="#">✓ Free Audit</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
